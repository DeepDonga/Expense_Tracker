{% extends "layout.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Edit Transaction — {{ account.account_name }}</h3>
  <div>
    <a href="{{ url_for('view_account', account_id=account.id) }}" class="btn btn-outline-secondary btn-sm">← Back</a>
  </div>
</div>

<form method="post" class="card p-3">

  <div class="row g-3">
    <div class="col-md-3">
      <label class="form-label">Type</label>
      <select name="transaction_type" class="form-select" required>
        <option value="expense" {% if tx.transaction_type == 'expense' %}selected{% endif %}>Expense</option>
        <option value="income"  {% if tx.transaction_type == 'income' %}selected{% endif %}>Income</option>
      </select>
    </div>

    <div class="col-md-3">
      <label class="form-label">Amount (₹)</label>
      <input type="number" name="amount" step="0.01" min="0.01" class="form-control"
             value="{{ '%.2f'|format(tx.amount or 0) }}" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Date</label>
      <input type="date" name="date" class="form-control"
             value="{{ tx.date.strftime('%Y-%m-%d') if tx.date else '' }}" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Category</label>
      <input type="text" name="category" maxlength="64" class="form-control" value="{{ tx.category or '' }}">
    </div>

    <div class="col-12">
      <label class="form-label">Description</label>
      <input type="text" name="description" maxlength="1024" class="form-control" value="{{ tx.note or '' }}">
    </div>
  </div>

  <div class="mt-3 d-flex justify-content-end gap-2">
    <a href="{{ url_for('view_account', account_id=account.id) }}" class="btn btn-outline-secondary">Cancel</a>
    <button type="submit" class="btn btn-success">Save Changes</button>
  </div>
</form>

{% endblock %}
