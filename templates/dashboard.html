{% extends "layout.html" %} {% block content %}
<h2>Dashboard</h2>

<!-- Main Content Area -->

<!-- Statistics Cards -->
<div class="row mb-3">
  <div class="col-lg-3 col-md-4 col-sm-6 mb-3">
    <div class="stat-card income">
      <div class="stat-icon">
        <i class="fas fa-arrow-up"></i>
      </div>
      <h6 class="text-muted mb-1">Income</h6>
      <h4 class="mb-0">₹{{ total_income }}</h4>
    </div>
  </div>

  <div class="col-lg-3 col-md-6 col-sm-6 mb-3">
    <div class="stat-card expenses">
      <div class="stat-icon">
        <i class="fas fa-arrow-down"></i>
      </div>
      <h6 class="text-muted mb-1">Expenses</h6>
      <h4 class="mb-0">₹{{ total_expenses }}</h4>
    </div>
  </div>

  <div class="col-lg-3 col-md-6 col-sm-6 mb-3">
    <div class="stat-card balance">
      <div class="stat-icon">
        <i class="fas fa-wallet"></i>
      </div>
      <h6 class="text-muted mb-1">Balance</h6>
      <h4 class="mb-0">₹{{ balance }}</h4>
    </div>
  </div>

  <div class="col-lg-3 col-md-6 col-sm-6 mb-3">
    <div class="stat-card transactions">
      <div class="stat-icon">
        <i class="fas fa-list"></i>
      </div>
      <h6 class="text-muted mb-1">Transactions</h6>
      <h4 class="mb-0">{{ total_transactions }}</h4>
    </div>
  </div>
</div>

<!-- Dual Chart Section -->
<div class="row">
  <!-- Expense Chart -->
  <div class="charts">
    <div class="col-md-6 custom-chart-size mb-4">
      <h5 class="mb-3">Expense Breakdown</h5>
      <canvas id="expense-chart" width="400" height="400"></canvas>
      <div id="expense-legend" class="mt-3"></div>
    </div>

    <!-- Income Chart -->
    <div class="col-md-6 custom-chart-size mb-4">
      <h5 class="mb-3">Income Breakdown</h5>
      <canvas id="income-chart" width="400" height="400"></canvas>
      <div id="income-legend" class="mt-3"></div>
    </div>
  </div>
</div>

<script>
  const incomeData = {
      labels: {{ income_labels | tojson }},
      values: {{ income_values | tojson }},
      colors: {{ income_colors | tojson }}
  };

  const expenseData = {
      labels: {{ expense_labels | tojson }},
      values: {{ expense_values | tojson }},
      colors: {{ expense_colors | tojson }}
  };

  const incomeLegend = {{ income_legend | tojson }};
  const expenseLegend = {{ expense_legend | tojson }};

  // Helper function to render legends
  function renderLegend(containerId, data) {
      const container = document.getElementById(containerId);
      container.innerHTML = data.length ? '' : '<p class="text-muted">No data available.</p>';

      data.forEach(item => {
          const legendItem = `
              <div class="legend-item d-flex mb-2">
                  <div class="legend-color me-2" style="background-color: ${item.color}; width: 12px; height: 12px; border-radius: 50%;"></div>
                  <div class="flex-grow-1">
                      <div class="d-flex justify-content-between">
                          <span class="fw-medium">${item.name}</span>
                          <span class="text-muted">${item.percent}%</span>
                          <div class="text-muted small">₹${item.amount}</div>
                      </div>
                      
                  </div>
              </div>
          `;
          container.insertAdjacentHTML('beforeend', legendItem);
      });
  }

  // Render both charts on load
  document.addEventListener('DOMContentLoaded', () => {
      const expenseCtx = document.getElementById('expense-chart').getContext('2d');
      const incomeCtx = document.getElementById('income-chart').getContext('2d');

      new Chart(expenseCtx, {
          type: 'doughnut',
          data: {
              labels: expenseData.labels,
              datasets: [{
                  data: expenseData.values,
                  backgroundColor: expenseData.colors,
                  borderWidth: 1
              }]
          },
          options: {
              responsive: true,
              plugins: { legend: { display: false } }
          }
      });

      new Chart(incomeCtx, {
          type: 'doughnut',
          data: {
              labels: incomeData.labels,
              datasets: [{
                  data: incomeData.values,
                  backgroundColor: incomeData.colors,
                  borderWidth: 1
              }]
          },
          options: {
              responsive: true,
              plugins: { legend: { display: false } }
          }
      });

      renderLegend('expense-legend', expenseLegend);
      renderLegend('income-legend', incomeLegend);
  });
</script>

<script>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      $(document).ready(function () {
        {% for category, message in messages %}
          toastr.options = {
            "closeButton": true,
            "progressBar": true,
            "timeOut": "4000",
            "positionClass": "toast-top-right"
          };
          toastr["{{ category }}"]("{{ message }}");
        {% endfor %}
      });
    {% endif %}
  {% endwith %}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- jQuery (required for daterangepicker) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Moment.js (required for daterangepicker) -->
<script src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>

<!-- Date Range Picker JS -->
<script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

{% endblock %}
