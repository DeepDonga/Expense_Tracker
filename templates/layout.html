<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Dashboard</title>
    
    <!-- Flash messages -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Date Range Picker CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="/static/css/transaction.css" />
    <link rel="stylesheet" href="/static/css/custom.css">


</head>
<body>
     <!-- GREEN HEADER BAR (without tabs) -->
    <header class="main-header">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center py-2">
                <!-- Left Side - Company Name -->
                <div class="header-start">
                    <a href="{{url_for('dashboard')}}" class="header-brand">ExpenseWise</a>
                </div>
                
                <!-- Right Side - Buttons -->
                <div class="header-end d-flex align-items-center header-actions">
                    <a href="{{ url_for('add_transaction')}}" class="btn btn-light rounded-pill btn-add-new">
                        <i class="fas fa-plus me-1"></i>Add New
                    </a>
                    <a href="{{ url_for('logout') }}"  class="btn btn-outline-light">
                        <i class="fas fa-sign-out-alt me-1"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- DASHBOARD CONTENT -->
     <div class="container-fluid py-3 main-content">
        <div class="row ">
            <!-- Left Sidebar with Navigation -->
            <div class="col-lg-3 col-md-4 mb-3">
                <div class="sidebar">
                    <!-- Profile Section -->
                    <div class="text-center mb-3">
                        <h3 class="mb-0">{{ user.name }}</h3>
                    </div>
                    
                    <!-- Balance Card -->
                    <div class="balance-card text-center">
                        <h4 class="mb-1">Current Balance</h4>
                        <h3 class="mb-0">₹{{ global_balance }}</h3>
                    </div>
                    
                    <!-- Navigation Menu with Tabs -->
                    <ul class="nav-menu">
                        <li><a href="{{ url_for('dashboard')}}">
                            <i class="fas fa-tachometer-alt"></i>Dashboard
                        </a></li>
                        <li><a href="{{url_for('accounts')}}">
                            <i class="fas fa-handshake"></i>Accounts
                        </a></li>
                        <li><a href="{{ url_for('history_page')}}" >
                            <i class="fas fa-history"></i>History
                        </a></li>

                        
                        <!-- Divider -->
                        <li class="nav-divider"><hr></li>
                        
                        <li><a href="{{ url_for('edit_profile')}}">
                            <i class="fas fa-user"></i>Profile
                        </a></li>
                    </ul>
                </div>
            </div>

            <!-- Right Side - Main Page Content -->
            <div class="col-lg-9 col-md-8">
                {% block content %}
            <!-- This is where your page content will be inserted -->
                {% endblock %}
            </div>
        </div>
    </div>

</body>
</html>
