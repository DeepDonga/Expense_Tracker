{% extends "layout.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Edit Account — {{ account.account_name }}</h3>
  <a href="{{ url_for('accounts') }}" class="btn btn-outline-secondary btn-sm">← Back</a>
</div>

<form method="post" class="card p-3 shadow-sm">

  <div class="mb-3">
    <label class="form-label">Account Name</label>
    <input type="text" name="account_name" class="form-control"
           value="{{ account.account_name }}" maxlength="100" required>
  </div>

  <div class="alert alert-info">
    Account balance cannot be changed directly.
    Add or delete transactions to adjust the balance.
  </div>

  <div class="d-flex justify-content-end">
    <button class="btn btn-success px-4">Save Changes</button>
  </div>

</form>

{% endblock %}
