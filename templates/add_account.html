{% extends "layout.html" %} {% block title %}Add New Account - ExpenseWise{%
endblock %} {% block content %}
<div class="dashboard-bg">
  <div class="container-fluid">
    <!-- Main Form Container -->
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-9 col-xl-8">
        <div class="transaction-card">
          <div class="card-header">
            <h2 class="card-title">
              <i class="fas fa-plus-circle me-2"></i>
              Add New Account
            </h2>
          </div>

          <div class="card-body">
            <form
              method="post"
              action="{{ url_for('add_accounts')}}"
              id="transactionForm"
            >

            <!-- Row 1: Account Name -->
              <div class="form-group mb-4">
                <label class="form-label">
                  <i class="fas fa-align-left me-2"></i> Account Name
                </label>
                <input type="text" class="form-control custom-input" name="account_name" id="account_name" required>
              </div>

              <!-- Row 2: Amount -->
              <div class="row mb-4">
                <div class="col-12 col-md-6">
                  <div class="form-group">
                    <label class="form-label">💵 Initial Amount</label>
                    <div class="input-group">
                      <span class="input-group-text">₹</span>
                      <input
                        type="number"
                        class="form-control custom-input"
                        name="amount"
                        id="amount"
                        value="0"
                        placeholder="0.00"
                        step="1.00"
                        min="0"
                      />
                    </div>
                  </div>
                </div>
              </div>

              <!-- Action Buttons -->
              <div class="form-actions">
              <a href="{{ url_for('accounts') }}" class="btn btn-cancel me-3">
                <i class="fas fa-times me-2"></i> Cancel </a>
               
                <button type="submit" class="btn btn-submit">
                  <i class="fas fa-plus me-2"></i> Add Account
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

<script>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      $(document).ready(function () {
        {% for category, message in messages %}
          toastr.options = {
            "closeButton": true,
            "progressBar": true,
            "timeOut": "4000",
            "positionClass": "toast-top-right"
          };
          toastr["{{ category }}"]("{{ message }}");
        {% endfor %}
      });
    {% endif %}
  {% endwith %}
</script>

{% endblock %}
