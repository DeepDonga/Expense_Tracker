{% extends "layout.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Accounts</h2>
  <a href="{{ url_for('add_accounts') }}" class="btn btn-dark rounded-pill">
    <i class="fas fa-plus me-1"></i> Add New
  </a>
</div>

<div class="table-responsive">
  <table class="table table-hover align-middle">
    <thead class="table-light">
      <tr>
        <th>Account Name</th>
        <th class="text-end">Balance</th>
        <th class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for account in accounts %}
      <tr>
        <td class="fw-semibold">{{ account.account_name }}</td>
        <td class="text-end">₹{{ '%.2f'|format(account.amount or 0) }}</td>
        <td class="text-end">
          <a href="{{ url_for('view_account', account_id=account.id) }}" class="btn btn-sm btn-outline-primary me-1">View</a>
          <a href="{{ url_for('edit_account', account_id=account.id) }}" class="btn btn-sm btn-outline-secondary me-1">Edit</a>
          <form method="post"
      action="{{ url_for('delete_account', account_id=account.id) }}"
      class="d-inline-block"
      onsubmit="return confirm('Are you sure you want to delete this account?');">
  <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
</form>

        </td>
      </tr>
      {% else %}
      <tr>
        <td colspan="3" class="text-center text-muted py-4">
          No accounts created yet. Click <a href="{{ url_for('add_accounts')}}"><strong>Add New</strong></a> to get started.
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
